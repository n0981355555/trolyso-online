<!DOCTYPE html>
<html lang="vi" class="h-full bg-slate-50">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Đăng nhập - CMS Trợ Lý Số</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Outfit', sans-serif;
    }
  </style>
</head>
<body class="h-full flex items-center justify-center p-4 bg-gradient-to-tr from-slate-900 via-indigo-950 to-slate-900">
  <div class="w-full max-w-md bg-white/10 backdrop-blur-md border border-white/20 p-8 rounded-3xl shadow-2xl text-white">
    <div class="text-center mb-8">
      <div class="w-16 h-16 bg-blue-600 rounded-2xl flex items-center justify-center mx-auto mb-4 shadow-lg shadow-blue-500/30">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M13 10V3L4 14h7v7l9-11h-7z" />
        </svg>
      </div>
      <h2 class="text-2xl font-bold tracking-tight">CMS TRỢ LÝ SỐ</h2>
      <p class="text-xs text-slate-300 mt-2">Hệ thống quản trị nội dung chuẩn SEO & Tĩnh</p>
    </div>

    <div id="errorAlert" class="hidden mb-6 p-4 bg-red-500/20 border border-red-500/30 text-red-200 text-sm rounded-2xl">
      Sai tài khoản hoặc mật khẩu. Vui lòng kiểm tra lại!
    </div>

    <form id="loginForm" class="space-y-6">
      <div>
        <label for="username" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Tên đăng nhập / Email</label>
        <input type="text" id="username" required 
          class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400"
          placeholder="Nhập tên đăng nhập...">
      </div>

      <div>
        <label for="password" class="block text-xs font-semibold text-slate-300 uppercase tracking-wider mb-2">Mật khẩu</label>
        <input type="password" id="password" required 
          class="w-full px-4 py-3 bg-white/5 border border-white/10 rounded-2xl focus:outline-none focus:ring-2 focus:ring-blue-500 text-white placeholder-slate-400"
          placeholder="••••••••">
      </div>

      <button type="submit" 
        class="w-full py-3.5 bg-blue-600 hover:bg-blue-500 active:scale-[0.98] transition font-bold rounded-2xl shadow-lg shadow-blue-500/20">
        Đăng nhập
      </button>
    </form>
  </div>

  <script>
    const form = document.getElementById('loginForm');
    const errorAlert = document.getElementById('errorAlert');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      errorAlert.classList.add('hidden');
      
      const username = document.getElementById('username').value;
      const password = document.getElementById('password').value;

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ username, password })
        });

        const data = await response.json();

        if (response.ok) {
          localStorage.setItem('accessToken', data.accessToken);
          localStorage.setItem('refreshToken', data.refreshToken);
          localStorage.setItem('user', JSON.stringify(data.user));
          window.location.href = '/';
        } else {
          errorAlert.innerText = data.message || 'Đã xảy ra lỗi đăng nhập';
          errorAlert.classList.remove('hidden');
        }
      } catch (err) {
        errorAlert.innerText = 'Không thể kết nối đến máy chủ API';
        errorAlert.classList.remove('hidden');
      }
    });

    // Check if already logged in
    if (localStorage.getItem('accessToken')) {
      window.location.href = '/';
    }
  </script>
</body>
</html>
